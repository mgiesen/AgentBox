# AgentBox-SMB-Config — Standalone-Server mit einem lokalen SMB-User.
# Der Container läuft als unprivilegierter User und bekommt nur
# CAP_NET_BIND_SERVICE, damit smbd den Standard-Port 445 binden kann.

[global]
   workgroup = WORKGROUP
   server string = AgentBox
   netbios name = AGENTBOX
   server role = standalone server
   security = user
   map to guest = never
   server min protocol = SMB2
   smb ports = 445

   dns proxy = no
   usershare max shares = 0
   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes
   max log size = 50

   idmap config * : backend = tdb
   idmap config * : range = 3000-7999

   # Mac-Kompatibilität ohne Finder-Veto-Regeln oder Time-Machine-Spezialfälle.
   ea support = yes
   vfs objects = fruit streams_xattr
   fruit:metadata = stream
   fruit:model = MacSamba
   fruit:nfs_aces = no

   passdb backend = tdbsam:/home/agent/.local/share/samba/private/passdb.tdb
   private dir       = /home/agent/.local/share/samba/private
   state directory   = /home/agent/.local/share/samba/state
   cache directory   = /home/agent/.local/share/samba/cache
   lock directory    = /home/agent/.local/share/samba/lock
   pid directory     = /home/agent/.local/share/samba/run
   log file          = /home/agent/.local/share/samba/log/log.%m
   ncalrpc dir       = /home/agent/.local/share/samba/ncalrpc

[workspace]
   comment = AgentBox Workspace
   path = /workspace
   browseable = yes
   read only = no
   valid users = agent
   create mask = 0664
   directory mask = 0775
   force user = agent
   force group = agent
